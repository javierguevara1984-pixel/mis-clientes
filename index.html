<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Cloud</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 10px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 14px; }
        .btn-principal { background-color: #1a73e8; color: white; font-weight: bold; grid-column: 1 / -1; height: 50px; cursor: pointer; border: none; }
        .btn-principal.modo-edicion { background-color: #f4b400; }
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #ffffff; color: #5f6368; text-transform: uppercase; font-size: 12px; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; }
        .pagado { background-color: #e6f4ea; color: #1e7e34; }
        .pendiente { background-color: #fce8e6; color: #d93025; }
        .btn-accion { padding: 8px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: white; margin-right: 5px; }
        .btn-eliminar { color: #d93025; border-color: #fce8e6; }
        .btn-eliminar:hover { background-color: #fce8e6; }
        .loading { color: #f4b400; font-weight: bold; text-align: center; display: none; padding: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de Control de Clientes</h2>
    <div id="statusCarga" class="loading">⏳ Sincronizando con la nube...</div>
    
    <div class="form-grid">
        <input type="hidden" id="editIndex" value="-1">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp (ej: 504...)">
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="number" id="precio" placeholder="Precio ($)">
        <input type="text" id="plan" placeholder="Plan">
        <select id="fechaPago">
            <option value="1">Día de Pago: 1</option>
            <option value="15">Día de Pago: 15</option>
        </select>
        <button id="btnPrincipal" class="btn-principal" onclick="procesarCliente()">💾 GUARDAR Y SINCRONIZAR</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Precio</th>
                    <th>Fecha Pago</th>
                    <th>Estado</th>
                    <th>Plan</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzha-FI4ghQY-O8WkRvNN1jIhWjmNLCGxuMx9lvFvmTYtkkPFQrnoyfijX7dOqD0qhw/exec";
    
    let clientes = [];

    async function cargarDatos() {
        document.getElementById('statusCarga').style.display = 'block';
        try {
            const res = await fetch(`${WEB_APP_URL}?t=${Date.now()}`, { redirect: "follow" });
            clientes = await res.json();
            actualizarVista();
        } catch (e) {
            clientes = JSON.parse(localStorage.getItem('backup_clientes')) || [];
            actualizarVista();
        }
        document.getElementById('statusCarga').style.display = 'none';
    }

    async function procesarCliente() {
        const index = document.getElementById('editIndex').value;
        const c = {
            action: "upsert",
            id: index === "-1" ? Date.now() : clientes[index].id,
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telefono').value,
            direccion: document.getElementById('direccion').value,
            precio: parseFloat(document.getElementById('precio').value) || 0,
            plan: document.getElementById('plan').value,
            fechaPago: document.getElementById('fechaPago').value,
            estadoPago: index === "-1" ? "Pendiente" : clientes[index].estadoPago
        };

        if(!c.nombre || !c.telefono) return alert("Nombre y Teléfono son obligatorios.");

        document.getElementById('statusCarga').style.display = 'block';
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(c) });
            if(index === "-1") clientes.push(c); else clientes[index] = c;
            limpiar();
            actualizarVista();
        } catch (e) { alert("Error al sincronizar."); }
        document.getElementById('statusCarga').style.display = 'none';
    }

    async function eliminarUsuario(i) {
        if(!confirm(`¿Estás seguro de eliminar a ${clientes[i].nombre}?`)) return;

        const idEliminar = clientes[i].id;
        document.getElementById('statusCarga').style.display = 'block';

        try {
            // Enviamos la instrucción de eliminar al Script de Google
            await fetch(WEB_APP_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify({ action: "delete", id: idEliminar }) 
            });
            
            clientes.splice(i, 1);
            actualizarVista();
        } catch (e) {
            alert("Error al eliminar en la nube, se borró de la vista local.");
            clientes.splice(i, 1);
            actualizarVista();
        }
        document.getElementById('statusCarga').style.display = 'none';
    }

    function actualizarVista() {
        localStorage.setItem('backup_clientes', JSON.stringify(clientes));
        const cuerpo = document.getElementById('cuerpoTabla');
        cuerpo.innerHTML = "";
        clientes.forEach((c, i) => {
            cuerpo.innerHTML += `
                <tr>
                    <td><b>${c.nombre}</b></td>
                    <td>${c.telefono}</td>
                    <td>${c.direccion || '-'}</td>
                    <td>$${c.precio}</td>
                    <td>Día ${c.fechaPago}</td>
                    <td><button class="status-badge ${c.estadoPago.toLowerCase()}" onclick="cambiarEstado(${i})">${c.estadoPago}</button></td>
                    <td>${c.plan || '-'}</td>
                    <td>
                        <button class="btn-accion" onclick="editar(${i})" title="Editar">✏️</button>
                        <button class="btn-accion" onclick="enviarWA('${c.nombre}','${c.telefono}')" title="WhatsApp">📲</button>
                        <button class="btn-accion btn-eliminar" onclick="eliminarUsuario(${i})" title="Eliminar">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    function editar(i) {
        const c = clientes[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('nombre').value = c.nombre;
        document.getElementById('telefono').value = c.telefono;
        document.getElementById('direccion').value = c.direccion;
        document.getElementById('precio').value = c.precio;
        document.getElementById('plan').value = c.plan;
        document.getElementById('fechaPago').value = c.fechaPago;
        const btn = document.getElementById('btnPrincipal');
        btn.innerText = "🔄 ACTUALIZAR USUARIO";
        btn.classList.add("modo-edicion");
        window.scrollTo(0,0);
    }

    function cambiarEstado(i) {
        clientes[i].estadoPago = clientes[i].estadoPago === "Pendiente" ? "Pagado" : "Pendiente";
        actualizarVista();
    }

    function enviarWA(n, t) {
        const m = encodeURIComponent(`Hola ${n}, recordatorio de pago de Internet. Gracias.`);
        window.open(`https://wa.me/${t}?text=${m}`, '_blank');
    }

    function limpiar() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('editIndex').value = "-1";
        const btn = document.getElementById('btnPrincipal');
        btn.innerText = "💾 GUARDAR Y SINCRONIZAR";
        btn.classList.remove("modo-edicion");
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
