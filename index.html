<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Clientes - Cloud</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 25px; }
        
        /* Formulario */
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin-bottom: 30px; background: #f8f9fa; padding: 20px; border-radius: 10px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }
        
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; font-size: 14px; }
        
        .btn-principal { background-color: #1a73e8; color: white; font-weight: bold; grid-column: 1 / -1; height: 50px; cursor: pointer; border: none; transition: 0.3s; }
        .btn-principal.modo-edicion { background-color: #f4b400; }
        .btn-principal:hover { opacity: 0.9; }

        /* Tabla */
        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: #ffffff; color: #5f6368; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px; }
        
        /* Estados */
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; }
        .pagado { background-color: #e6f4ea; color: #1e7e34; }
        .pendiente { background-color: #fce8e6; color: #d93025; }
        
        /* Acciones */
        .btn-accion { padding: 8px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: white; margin-right: 5px; transition: 0.2s; }
        .btn-accion:hover { background: #f0f0f0; }
        
        .loading { color: #f4b400; font-weight: bold; text-align: center; display: none; padding: 15px; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de Control de Clientes</h2>
    
    <div id="statusCarga" class="loading">⏳ Procesando con la nube...</div>
    
    <div class="form-grid">
        <input type="hidden" id="editIndex" value="-1">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="Teléfono (ej: 504...)">
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="number" id="precio" placeholder="Precio ($)">
        <input type="text" id="plan" placeholder="Plan contratado">
        <select id="fechaPago">
            <option value="1">Día de Pago: 1</option>
            <option value="15">Día de Pago: 15</option>
        </select>
        <button id="btnPrincipal" class="btn-principal" onclick="procesarCliente()">💾 GUARDAR Y SINCRONIZAR</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Precio</th>
                    <th>Fecha Pago</th>
                    <th>Estado</th>
                    <th>Plan</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    // URL Actualizada según tu solicitud
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzha-FI4ghQY-O8WkRvNN1jIhWjmNLCGxuMx9lvFvmTYtkkPFQrnoyfijX7dOqD0qhw/exec";
    
    let clientes = [];

    // Función para cargar datos al iniciar
    async function cargarDatos() {
        const loader = document.getElementById('statusCarga');
        loader.style.display = 'block';
        try {
            const res = await fetch(WEB_APP_URL, { redirect: "follow" });
            clientes = await res.json();
            actualizarVista();
        } catch (e) {
            console.error("Error cargando datos:", e);
            clientes = JSON.parse(localStorage.getItem('backup_clientes')) || [];
            actualizarVista();
        }
        loader.style.display = 'none';
    }

    // Función para Guardar o Editar
    async function procesarCliente() {
        const index = document.getElementById('editIndex').value;
        
        const clienteData = {
            id: index === "-1" ? Date.now() : clientes[index].id,
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telefono').value,
            direccion: document.getElementById('direccion').value,
            precio: parseFloat(document.getElementById('precio').value) || 0,
            plan: document.getElementById('plan').value,
            fechaPago: document.getElementById('fechaPago').value,
            estadoPago: index === "-1" ? "Pendiente" : clientes[index].estadoPago
        };

        if(!clienteData.nombre || !clienteData.telefono) return alert("Nombre y Teléfono son necesarios.");

        document.getElementById('statusCarga').style.display = 'block';

        try {
            // Sincronización con Google Sheets
            await fetch(WEB_APP_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify(clienteData) 
            });
            
            // Actualización local
            if(index === "-1") {
                clientes.push(clienteData);
            } else {
                clientes[index] = clienteData;
            }
            
            limpiarFormulario();
            actualizarVista();
        } catch (e) {
            alert("Error de red. Los cambios se reflejarán localmente.");
            if(index === "-1") clientes.push(clienteData); else clientes[index] = clienteData;
            actualizarVista();
        }
        document.getElementById('statusCarga').style.display = 'none';
    }

    function actualizarVista() {
        localStorage.setItem('backup_clientes', JSON.stringify(clientes));
        const cuerpo = document.getElementById('cuerpoTabla');
        cuerpo.innerHTML = "";

        clientes.forEach((c, i) => {
            cuerpo.innerHTML += `
                <tr>
                    <td><b>${c.nombre}</b></td>
                    <td>${c.telefono}</td>
                    <td>${c.direccion || '-'}</td>
                    <td>$${c.precio}</td>
                    <td>Día ${c.fechaPago}</td>
                    <td>
                        <button class="status-badge ${c.estadoPago.toLowerCase()}" onclick="cambiarEstado(${i})">
                            ${c.estadoPago}
                        </button>
                    </td>
                    <td>${c.plan || '-'}</td>
                    <td>
                        <button class="btn-accion" onclick="prepararEdicion(${i})" title="Editar">✏️</button>
                        <button class="btn-accion" onclick="enviarWhatsApp('${c.nombre}','${c.telefono}')" title="WhatsApp">📲</button>
                    </td>
                </tr>`;
        });
    }

    // Cargar datos al formulario para editar
    function prepararEdicion(i) {
        const c = clientes[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('nombre').value = c.nombre;
        document.getElementById('telefono').value = c.telefono;
        document.getElementById('direccion').value = c.direccion;
        document.getElementById('precio').value = c.precio;
        document.getElementById('plan').value = c.plan;
        document.getElementById('fechaPago').value = c.fechaPago;
        
        const btn = document.getElementById('btnPrincipal');
        btn.innerText = "🔄 ACTUALIZAR DATOS";
        btn.classList.add("modo-edicion");
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function cambiarEstado(i) {
        clientes[i].estadoPago = clientes[i].estadoPago === "Pendiente" ? "Pagado" : "Pendiente";
        actualizarVista();
    }

    function enviarWhatsApp(nombre, tel) {
        const mensaje = encodeURIComponent(`Hola ${nombre}, te saludamos de Internet Cloud para recordarte tu pago mensual. ¡Muchas gracias!`);
        window.open(`https://wa.me/${tel}?text=${mensaje}`, '_blank');
    }

    function limpiarFormulario() {
        document.getElementById('editIndex').value = "-1";
        document.querySelectorAll('input').forEach(input => input.value = '');
        const btn = document.getElementById('btnPrincipal');
        btn.innerText = "💾 GUARDAR Y SINCRONIZAR";
        btn.classList.remove("modo-edicion");
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
