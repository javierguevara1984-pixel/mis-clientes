<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Internet Cloud</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background-color: #f0f2f5; }
        .container { max-width: 1100px; margin: auto; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; }
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 20px; }
        @media (min-width: 600px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        .btn-guardar { background-color: #1a73e8; color: white; font-weight: bold; grid-column: 1 / -1; height: 50px; cursor: pointer; border: none; }
        .btn-actualizar { background-color: #f4b400; color: white; font-weight: bold; grid-column: 1 / -1; height: 50px; cursor: pointer; border: none; }
        .table-container { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background-color: #f8f9fa; color: #5f6368; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; }
        .pagado { background-color: #e6f4ea; color: #1e7e34; }
        .pendiente { background-color: #fce8e6; color: #d93025; }
        .btn-accion { padding: 6px; border-radius: 4px; border: 1px solid #ddd; cursor: pointer; background: white; margin-right: 5px; }
        .loading { color: #f4b400; font-weight: bold; text-align: center; display: none; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de Control</h2>
    <div id="statusCarga" class="loading">⏳ Sincronizando...</div>
    
    <div class="form-grid">
        <input type="hidden" id="editIndex" value="-1">
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="tel" id="telefono" placeholder="Teléfono (WhatsApp)">
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="number" id="precio" placeholder="Precio ($)">
        <input type="text" id="plan" placeholder="Plan">
        <select id="fechaPago">
            <option value="1">Fecha de Pago: Día 1</option>
            <option value="15">Fecha de Pago: Día 15</option>
        </select>
        <button id="btnPrincipal" class="btn-guardar" onclick="procesarCliente()">💾 GUARDAR Y SINCRONIZAR</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Precio</th>
                    <th>Fecha Pago</th>
                    <th>Estado</th>
                    <th>Plan</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzha-FI4ghQY-O8WkRvNN1jIhWjmNLCGxuMx9lvFvmTYtkkPFQrnoyfijX7dOqD0qhw/exec";
    let clientes = [];

    async function cargarDatos() {
        document.getElementById('statusCarga').style.display = 'block';
        try {
            const res = await fetch(WEB_APP_URL, { redirect: "follow" });
            const data = await res.json();
            clientes = data;
            actualizarVista();
        } catch (e) {
            clientes = JSON.parse(localStorage.getItem('backup_clientes')) || [];
            actualizarVista();
        }
        document.getElementById('statusCarga').style.display = 'none';
    }

    async function procesarCliente() {
        const index = document.getElementById('editIndex').value;
        const btn = document.getElementById('btnPrincipal');
        
        const c = {
            id: index === "-1" ? Date.now() : clientes[index].id,
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telefono').value,
            direccion: document.getElementById('direccion').value,
            precio: parseFloat(document.getElementById('precio').value) || 0,
            plan: document.getElementById('plan').value,
            fechaPago: document.getElementById('fechaPago').value,
            estadoPago: index === "-1" ? "Pendiente" : clientes[index].estadoPago
        };

        if(!c.nombre || !c.telefono) return alert("Nombre y Teléfono son obligatorios");

        document.getElementById('statusCarga').style.display = 'block';
        try {
            // Enviar a Google Sheets
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(c) });
            
            if(index === "-1") clientes.push(c); else clientes[index] = c;
            
            cancelarEdicion();
            actualizarVista();
            limpiar();
        } catch (e) { alert("Error al sincronizar"); }
        document.getElementById('statusCarga').style.display = 'none';
    }

    function actualizarVista() {
        localStorage.setItem('backup_clientes', JSON.stringify(clientes));
        const cuerpo = document.getElementById('cuerpoTabla');
        cuerpo.innerHTML = "";

        clientes.forEach((c, i) => {
            cuerpo.innerHTML += `
                <tr>
                    <td><b>${c.nombre}</b></td>
                    <td>${c.telefono}</td>
                    <td>${c.direccion || '-'}</td>
                    <td>$${c.precio}</td>
                    <td>Día ${c.fechaPago}</td>
                    <td><button class="status-badge ${c.estadoPago.toLowerCase()}" onclick="cambiarEstado(${i})">${c.estadoPago}</button></td>
                    <td>${c.plan || '-'}</td>
                    <td>
                        <button class="btn-accion" onclick="editar(${i})">✏️</button>
                        <button class="btn-accion" onclick="enviarWA('${c.nombre}','${c.telefono}')">📲</button>
                    </td>
                </tr>`;
        });
    }

    function editar(i) {
        const c = clientes[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('nombre').value = c.nombre;
        document.getElementById('telefono').value = c.telefono;
        document.getElementById('direccion').value = c.direccion;
        document.getElementById('precio').value = c.precio;
        document.getElementById('plan').value = c.plan;
        document.getElementById('fechaPago').value = c.fechaPago;
        
        const btn = document.getElementById('btnPrincipal');
        btn.innerText = "🔄 ACTUALIZAR USUARIO";
        btn.className = "btn-actualizar";
        window.scrollTo(0,0);
    }

    function cancelarEdicion() {
        document.getElementById('editIndex').value = "-1";
        const btn = document.getElementById('btnPrincipal');
        btn.innerText = "💾 GUARDAR Y SINCRONIZAR";
        btn.className = "btn-guardar";
    }

    function cambiarEstado(i) {
        clientes[i].estadoPago = clientes[i].estadoPago === "Pendiente" ? "Pagado" : "Pendiente";
        actualizarVista();
    }

    function enviarWA(n, t) {
        const msg = encodeURIComponent(`Hola ${n}, te saludamos de Internet Cloud. Recordatorio de tu pago. Gracias.`);
        window.open(`https://wa.me/${t}?text=${msg}`, '_blank');
    }

    function limpiar() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('editIndex').value = "-1";
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
