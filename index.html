<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión Internet Cloud - Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        
        /* Dashboard Financiero */
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .card { padding: 15px; border-radius: 10px; text-align: center; color: white; font-weight: bold; }
        .total { background: #5f6368; }
        .recaudado { background: #1e7e34; }
        .pendiente { background: #d93025; }
        .card span { display: block; font-size: 0.8em; opacity: 0.9; }
        .card div { font-size: 1.5em; margin-top: 5px; }

        /* Buscador y Filtros */
        .search-filter-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        #buscadorNombre { padding: 12px; border-radius: 8px; border: 2px solid #1a73e8; width: 100%; box-sizing: border-box; font-size: 16px; }
        .filter-bar { display: flex; gap: 10px; justify-content: center; }
        .btn-filter { padding: 10px 20px; border: none; border-radius: 20px; cursor: pointer; background: #e8f0fe; color: #1a73e8; font-weight: bold; transition: 0.3s; }
        .btn-filter.active { background: #1a73e8; color: white; }

        /* Formulario y Tabla */
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        .btn-principal { background-color: #1a73e8; color: white; font-weight: bold; grid-column: 1 / -1; height: 50px; cursor: pointer; border: none; }
        .btn-principal.modo-edicion { background-color: #f4b400; }
        
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        th { background-color: #f8f9fa; color: #5f6368; }
        
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; }
        .pagado { background-color: #e6f4ea; color: #1e7e34; }
        .pendiente-bg { background-color: #fce8e6; color: #d93025; }
        
        .btn-accion { padding: 8px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; background: white; margin-right: 5px; }
        .loading { color: #f4b400; font-weight: bold; text-align: center; display: none; padding: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Panel de Control Cloud</h2>

    <div class="dashboard">
        <div class="card total"><span>TOTAL ESPERADO</span><div id="montoTotal">$0</div></div>
        <div class="card recaudado"><span>RECAUDADO</span><div id="montoPagado">$0</div></div>
        <div class="card pendiente"><span>PENDIENTE</span><div id="montoPendiente">$0</div></div>
    </div>

    <div id="statusCarga" class="loading">⏳ Sincronizando...</div>

    <div class="form-grid">
        <input type="hidden" id="editIndex" value="-1">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp">
        <input type="text" id="direccion" placeholder="Dirección">
        <input type="number" id="precio" placeholder="Precio ($)">
        <input type="text" id="plan" placeholder="Plan">
        <select id="fechaPago">
            <option value="1">Corte: Día 1</option>
            <option value="15">Corte: Día 15</option>
        </select>
        <button id="btnPrincipal" class="btn-principal" onclick="procesarCliente()">💾 GUARDAR Y SINCRONIZAR</button>
    </div>

    <div class="search-filter-container">
        <input type="text" id="buscadorNombre" placeholder="🔍 Buscar cliente por nombre..." onkeyup="actualizarVista()">
        <div class="filter-bar">
            <button class="btn-filter active" onclick="filtrar('todos', this)">Todos</button>
            <button class="btn-filter" onclick="filtrar('1', this)">Día 1</button>
            <button class="btn-filter" onclick="filtrar('15', this)">Día 15</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Dirección</th>
                    <th>Precio</th>
                    <th>Fecha Pago</th>
                    <th>Estado</th>
                    <th>Plan</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzha-FI4ghQY-O8WkRvNN1jIhWjmNLCGxuMx9lvFvmTYtkkPFQrnoyfijX7dOqD0qhw/exec";
    let clientes = [];
    let filtroActual = 'todos';

    async function cargarDatos() {
        document.getElementById('statusCarga').style.display = 'block';
        try {
            const res = await fetch(`${WEB_APP_URL}?t=${Date.now()}`, { redirect: "follow" });
            clientes = await res.json();
            actualizarVista();
        } catch (e) {
            clientes = JSON.parse(localStorage.getItem('backup_clientes')) || [];
            actualizarVista();
        }
        document.getElementById('statusCarga').style.display = 'none';
    }

    function filtrar(dia, btn) {
        filtroActual = dia;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        actualizarVista();
    }

    function actualizarVista() {
        localStorage.setItem('backup_clientes', JSON.stringify(clientes));
        const cuerpo = document.getElementById('cuerpoTabla');
        const busqueda = document.getElementById('buscadorNombre').value.toLowerCase();
        cuerpo.innerHTML = "";
        
        let sumaTotal = 0, sumaPagado = 0, sumaPendiente = 0;

        clientes.forEach((c, i) => {
            const precio = parseFloat(c.precio) || 0;
            const cumpleFiltroFecha = filtroActual === 'todos' || c.fechaPago == filtroActual;
            const cumpleBusqueda = c.nombre.toLowerCase().includes(busqueda);

            // Totales financieros (sobre la base completa)
            sumaTotal += precio;
            if(c.estadoPago === "Pagado") sumaPagado += precio;
            else sumaPendiente += precio;

            // Mostrar solo si cumple ambos filtros
            if(cumpleFiltroFecha && cumpleBusqueda) {
                cuerpo.innerHTML += `
                    <tr>
                        <td><b>${c.nombre}</b></td>
                        <td>${c.telefono}</td>
                        <td>${c.direccion || '-'}</td>
                        <td>$${precio}</td>
                        <td>Día ${c.fechaPago}</td>
                        <td><button class="status-badge ${c.estadoPago.toLowerCase() === 'pagado' ? 'pagado' : 'pendiente-bg'}" onclick="cambiarEstado(${i})">${c.estadoPago}</button></td>
                        <td>${c.plan || '-'}</td>
                        <td>
                            <button class="btn-accion" onclick="editar(${i})">✏️</button>
                            <button class="btn-accion" onclick="enviarWA('${c.nombre}','${c.telefono}')">📲</button>
                            <button class="btn-accion" style="color:red" onclick="eliminarUsuario(${i})">🗑️</button>
                        </td>
                    </tr>`;
            }
        });

        document.getElementById('montoTotal').innerText = `$${sumaTotal}`;
        document.getElementById('montoPagado').innerText = `$${sumaPagado}`;
        document.getElementById('montoPendiente').innerText = `$${sumaPendiente}`;
    }

    async function procesarCliente() {
        const index = document.getElementById('editIndex').value;
        const c = {
            action: "upsert",
            id: index === "-1" ? Date.now() : clientes[index].id,
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telefono').value,
            direccion: document.getElementById('direccion').value,
            precio: parseFloat(document.getElementById('precio').value) || 0,
            plan: document.getElementById('plan').value,
            fechaPago: document.getElementById('fechaPago').value,
            estadoPago: index === "-1" ? "Pendiente" : clientes[index].estadoPago
        };

        if(!c.nombre || !c.telefono) return alert("Nombre y Teléfono requeridos");

        document.getElementById('statusCarga').style.display = 'block';
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(c) });
            if(index === "-1") clientes.push(c); else clientes[index] = c;
            limpiar();
            actualizarVista();
        } catch (e) { alert("Error al guardar"); }
        document.getElementById('statusCarga').style.display = 'none';
    }

    async function eliminarUsuario(i) {
        if(!confirm(`¿Eliminar a ${clientes[i].nombre}?`)) return;
        const id = clientes[i].id;
        document.getElementById('statusCarga').style.display = 'block';
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", id: id }) });
            clientes.splice(i, 1);
            actualizarVista();
        } catch (e) { alert("Error al eliminar"); }
        document.getElementById('statusCarga').style.display = 'none';
    }

    function cambiarEstado(i) {
        clientes[i].estadoPago = clientes[i].estadoPago === "Pendiente" ? "Pagado" : "Pendiente";
        actualizarVista();
    }

    function editar(i) {
        const c = clientes[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('nombre').value = c.nombre;
        document.getElementById('telefono').value = c.telefono;
        document.getElementById('direccion').value = c.direccion;
        document.getElementById('precio').value = c.precio;
        document.getElementById('plan').value = c.plan;
        document.getElementById('fechaPago').value = c.fechaPago;
        document.getElementById('btnPrincipal').innerText = "🔄 ACTUALIZAR USUARIO";
        document.getElementById('btnPrincipal').classList.add("modo-edicion");
        window.scrollTo(0,0);
    }

    function enviarWA(n, t) {
        const m = encodeURIComponent(`Hola ${n}, recordatorio de pago Cloud. Gracias.`);
        window.open(`https://wa.me/${t}?text=${m}`, '_blank');
    }

    function limpiar() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('editIndex').value = "-1";
        document.getElementById('btnPrincipal').innerText = "💾 GUARDAR Y SINCRONIZAR";
        document.getElementById('btnPrincipal').classList.remove("modo-edicion");
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
