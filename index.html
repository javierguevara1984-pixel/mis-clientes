<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewLink Wireless - Gestión Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 10px; background-color: #f0f2f5; color: #333; }
        .container { max-width: 1250px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h2 { color: #1a73e8; margin: 0; }
        
        .selector-mes { background: #1a73e8; color: white; padding: 8px 15px; border-radius: 8px; font-weight: bold; border: none; cursor: pointer; }
        
        /* Dashboard */
        .dashboard { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        @media (min-width: 768px) { .dashboard { grid-template-columns: repeat(4, 1fr); } }
        .card { padding: 12px; border-radius: 10px; text-align: center; color: white; }
        .total-clientes { background: #1a73e8; }
        .monto-total { background: #5f6368; }
        .recaudado { background: #1e7e34; }
        .pendiente { background: #d93025; }
        .card span { font-size: 0.75em; font-weight: bold; text-transform: uppercase; }
        .card div { font-size: 1.4em; font-weight: bold; }

        /* Formulario */
        .form-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 25px; background: #f8f9fa; padding: 15px; border-radius: 10px; }
        @media (min-width: 768px) { .form-grid { grid-template-columns: repeat(3, 1fr); } }
        input, select, button { padding: 10px; border-radius: 6px; border: 1px solid #ddd; width: 100%; box-sizing: border-box; }
        .btn-principal { background: #1a73e8; color: white; font-weight: bold; grid-column: 1 / -1; height: 45px; border: none; cursor: pointer; }

        /* Controles */
        .controls { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .search-bar { padding: 12px; border-radius: 8px; border: 2px solid #1a73e8; width: 100%; box-sizing: border-box; }
        .filter-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .btn-filter { padding: 8px 16px; border: none; border-radius: 15px; background: #e8f0fe; color: #1a73e8; cursor: pointer; font-weight: bold; white-space: nowrap; }
        .btn-filter.active { background: #1a73e8; color: white; }

        /* Tabla */
        .table-container { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 1050px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 13px; }
        .status-badge { padding: 5px 10px; border-radius: 15px; font-size: 11px; font-weight: bold; border: none; cursor: pointer; min-width: 90px; }
        .pagado { background: #e6f4ea; color: #1e7e34; }
        .no-pagado { background: #fce8e6; color: #d93025; }
        .btn-accion { padding: 6px; border: 1px solid #ddd; border-radius: 4px; background: white; cursor: pointer; font-size: 14px; }
        .loading { text-align: center; color: #f4b400; display: none; padding: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-flex">
        <h2>NewLink Wireless</h2>
        <select id="mesSeleccionado" class="selector-mes" onchange="actualizarVista()">
            <option value="Enero">Enero</option><option value="Febrero">Febrero</option>
            <option value="Marzo">Marzo</option><option value="Abril">Abril</option>
            <option value="Mayo">Mayo</option><option value="Junio">Junio</option>
            <option value="Julio">Julio</option><option value="Agosto">Agosto</option>
            <option value="Septiembre">Septiembre</option><option value="Octubre">Octubre</option>
            <option value="Noviembre">Noviembre</option><option value="Diciembre">Diciembre</option>
        </select>
    </div>

    <div class="dashboard">
        <div class="card total-clientes"><span>CLIENTES</span><div id="cantClientes">0</div></div>
        <div class="card monto-total"><span>MENSUAL</span><div id="montoTotal">$0</div></div>
        <div class="card recaudado"><span>COBRADO</span><div id="montoPagado">$0</div></div>
        <div class="card pendiente"><span>PENDIENTE</span><div id="montoPendiente">$0</div></div>
    </div>

    <div id="statusCarga" class="loading">⏳ Sincronizando con la nube...</div>

    <div class="form-grid">
        <input type="hidden" id="editIndex" value="-1">
        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="tel" id="telefono" placeholder="WhatsApp (Ej: 504...)">
        <input type="text" id="direccion" placeholder="Dirección / Referencia">
        <input type="number" id="precio" placeholder="Precio Mensual $">
        <input type="text" id="plan" placeholder="Plan (Ej: Internet 10MB)">
        <select id="fechaPago">
            <option value="1">Día de pago: 1</option>
            <option value="15">Día de pago: 15</option>
        </select>
        <button id="btnPrincipal" class="btn-principal" onclick="procesarCliente()">💾 GUARDAR / ACTUALIZAR</button>
    </div>

    <div class="controls">
        <input type="text" id="buscador" class="search-bar" placeholder="🔍 Buscar cliente por nombre..." onkeyup="actualizarVista()">
        <div class="filter-bar">
            <button class="btn-filter active" onclick="filtrar('todos', this)">Todos</button>
            <button class="btn-filter" onclick="filtrar('1', this)">Día 1</button>
            <button class="btn-filter" onclick="filtrar('15', this)">Día 15</button>
            <button class="btn-filter" onclick="filtrar('Pendiente', this)" style="color:red">No Pagados</button>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>WhatsApp</th>
                    <th>Precio</th>
                    <th>Corte</th>
                    <th>Estado de Pago</th>
                    <th>Plan</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzha-FI4ghQY-O8WkRvNN1jIhWjmNLCGxuMx9lvFvmTYtkkPFQrnoyfijX7dOqD0qhw/exec";
    let clientes = [];
    let filtroDia = 'todos';
    
    // Configurar mes actual
    const meses = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
    document.getElementById('mesSeleccionado').value = meses[new Date().getMonth()];

    async function cargarDatos() {
        document.getElementById('statusCarga').style.display = 'block';
        try {
            const res = await fetch(`${WEB_APP_URL}?t=${Date.now()}`, { redirect: "follow" });
            clientes = await res.json();
            actualizarVista();
        } catch (e) {
            clientes = JSON.parse(localStorage.getItem('backup_clientes')) || [];
            actualizarVista();
        }
        document.getElementById('statusCarga').style.display = 'none';
    }

    function filtrar(val, btn) {
        filtroDia = val;
        document.querySelectorAll('.btn-filter').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        actualizarVista();
    }

    function actualizarVista() {
        // Guardar respaldo local
        localStorage.setItem('backup_clientes', JSON.stringify(clientes));
        
        const cuerpo = document.getElementById('cuerpoTabla');
        cuerpo.innerHTML = ""; // Limpieza para evitar duplicados
        
        const busqueda = document.getElementById('buscador').value.toLowerCase();
        const mesFiltro = document.getElementById('mesSeleccionado').value;
        
        let t = 0, p = 0, pen = 0, cant = 0;

        clientes.forEach((c, i) => {
            const listaMeses = (c.ultimoMesPago || "").split(",").filter(m => m !== "");
            const estaPagado = listaMeses.includes(mesFiltro);
            const precio = parseFloat(c.precio) || 0;

            const cumpleDia = (filtroDia === 'todos' || filtroDia === 'Pendiente' || c.fechaPago == filtroDia);
            const cumpleEstado = (filtroDia !== 'Pendiente' || !estaPagado);
            const cumpleBusqueda = c.nombre.toLowerCase().includes(busqueda);

            cant++;
            t += precio;
            if(estaPagado) p += precio; else pen += precio;

            if(cumpleDia && cumpleEstado && cumpleBusqueda) {
                cuerpo.innerHTML += `
                    <tr>
                        <td><b>${c.nombre}</b><br><small style="color:gray">${c.direccion || ''}</small></td>
                        <td>${c.telefono}</td>
                        <td>$${precio}</td>
                        <td>Día ${c.fechaPago}</td>
                        <td>
                            <button class="status-badge ${estaPagado ? 'pagado' : 'no-pagado'}" 
                                onclick="togglePago(${i}, '${mesFiltro}')">${estaPagado ? 'PAGADO' : 'PENDIENTE'}
                            </button>
                        </td>
                        <td>${c.plan || '-'}</td>
                        <td>
                            <button class="btn-accion" title="Recibo" onclick="generarRecibo(${i})">📄</button>
                            <button class="btn-accion" title="Editar" onclick="editar(${i})">✏️</button>
                            <button class="btn-accion" title="WhatsApp" onclick="enviarWA(${i})">📲</button>
                            <button class="btn-accion" style="color:red" title="Eliminar" onclick="eliminarUsuario(${i})">🗑️</button>
                        </td>
                    </tr>`;
            }
        });

        document.getElementById('cantClientes').innerText = cant;
        document.getElementById('montoTotal').innerText = `$${t}`;
        document.getElementById('montoPagado').innerText = `$${p}`;
        document.getElementById('montoPendiente').innerText = `$${pen}`;
    }

    async function togglePago(i, mes) {
        let lista = (clientes[i].ultimoMesPago || "").split(",").filter(m => m !== "");
        lista.includes(mes) ? lista = lista.filter(m => m !== mes) : lista.push(mes);
        clientes[i].ultimoMesPago = lista.join(",");
        actualizarVista();
        await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "upsert", ...clientes[i] }) });
    }

    // FUNCIÓN PARA GENERAR EL RECIBO EN PDF (Rediseñada para coincidir con la referencia)
    function generarRecibo(i) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4'); // Formato A4
        const c = clientes[i];
        const mes = document.getElementById('mesSeleccionado').value;
        const now = new Date();
        const fechaEmsion = `${now.getDate()} de ${meses[now.getMonth()]} de ${now.getFullYear()} ${now.getHours()}:${now.getMinutes()}`;
        const fechaNombre = `${now.getDate()}_${meses[now.getMonth()].substring(0,3)}_${now.getFullYear()}`;

        // Paleta de colores (gris oscuro de la imagen)
        const grisOscuro = [64, 64, 76]; // #40404C aprox.
        const grisClaro = [102, 102, 102]; // #666666
        const blanco = [255, 255, 255];

        // --- ENCABEZADO ---
        doc.setFillColor(blanco[0], blanco[1], blanco[2]);
        doc.rect(0, 0, 210, 297, 'F'); // Fondo blanco completo

        // Logo Inalámbrico (Recreado con texto y forma)
        doc.setFillColor(26, 115, 232); // Azul corporativo de NewLink
        doc.ellipse(25, 25, 8, 8, 'F'); // Círculo de la antena
        doc.setFillColor(grisOscuro[0], grisOscuro[1], grisOscuro[2]);
        doc.ellipse(25, 25, 1, 1, 'F'); // Punto central
        // Ondas de WiFi
        doc.setLineWidth(1);
        doc.setDrawColor(grisOscuro[0], grisOscuro[1], grisOscuro[2]);
        doc.arc(25, 25, 5, 0, Math.PI, true); // Onda 1
        doc.arc(25, 25, 7, 0, Math.PI, true); // Onda 2

        doc.setTextColor(grisOscuro[0], grisOscuro[1], grisOscuro[2]);
        doc.setFontSize(18);
        doc.setFont("helvetica", "bold");
        doc.text("NEWLINK WIRELESS", 45, 28);
        
        // RECIBO#
        doc.setFontSize(22);
        const numeroRecibo = `${mes.substring(0,3).toUpperCase()}-${c.nombre.substring(0,3).toUpperCase()}`;
        doc.text(`RECIBO# ${numeroRecibo}`, 130, 28);

        // --- DATOS CLIENTE ---
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("DATOS DEL CLIENTE:", 20, 55);
        doc.setLineWidth(0.5);
        doc.line(20, 58, 190, 58); // Línea divisoria

        doc.setFontSize(12);
        doc.setFont("helvetica", "normal");
        doc.text(`👤  Nombre: ${c.nombre}`, 20, 70);
        doc.text(`📲  WhatsApp: ${c.telefono}`, 20, 80);
        doc.text(`📍  Dirección: ${c.direccion || 'Colonia Gracias A Dios'}`, 20, 90);

        // --- DETALLES DEL SERVICIO (TABLA) ---
        doc.setFontSize(14);
        doc.setFont("helvetica", "bold");
        doc.text("SERVICIO CONTRATADO:", 20, 110);
        doc.line(20, 113, 190, 113); // Línea divisoria

        // Cabecera de la tabla
        doc.setFontSize(11);
        doc.setTextColor(grisClaro[0], grisClaro[1], grisClaro[2]);
        doc.text("Cantidad", 20, 123);
        doc.text("Descripción", 50, 123);
        doc.text("Precio unitario ($)", 140, 123);

        // Contenido de la tabla
        doc.setTextColor(grisOscuro[0], grisOscuro[1], grisOscuro[2]);
        doc.setFont("helvetica", "normal");
        doc.text("1x", 20, 133);
        doc.setFont("helvetica", "bold"); // Nombre del plan en negrita como en la imagen
        doc.text(`${c.plan || 'Internet Plus'} (${mes})`, 50, 133);
        doc.setFont("helvetica", "normal");
        doc.text(`$ ${parseFloat(c.precio).toFixed(2)}`, 140, 133);
        
        doc.line(20, 138, 190, 138); // Línea divisoria tabla

        // --- TOTAL ---
        doc.setFontSize(16);
        doc.setFont("helvetica", "bold");
        doc.text(`Total: $ ${parseFloat(c.precio).toFixed(2)}`, 130, 155);

        doc.setFontSize(12);
        doc.setFont("helvetica", "normal");
        doc.text(`Pagar con Efectivo: $ ${parseFloat(c.precio).toFixed(2)}`, 130, 165);

        // --- PIE DE PÁGINA ---
        doc.setFontSize(12);
        doc.setFont("helvetica", "bold");
        doc.text("Gracias por su pago.", 105, 190, { align: "center" });
        
        doc.setFontSize(10);
        doc.setFont("helvetica", "normal");
        doc.setTextColor(grisClaro[0], grisClaro[1], grisClaro[2]);
        doc.text(fechaEmsion, 105, 200, { align: "center" });

        // Guardar PDF
        const nombreArchivo = `Recibo_${c.nombre.split(' ')[0]}_${mes}_${fechaNombre}.pdf`;
        doc.save(nombreArchivo);
    }

    async function procesarCliente() {
        const idx = document.getElementById('editIndex').value;
        const c = {
            action: "upsert",
            id: idx === "-1" ? Date.now() : clientes[idx].id,
            nombre: document.getElementById('nombre').value,
            telefono: document.getElementById('telefono').value,
            direccion: document.getElementById('direccion').value,
            precio: document.getElementById('precio').value,
            plan: document.getElementById('plan').value,
            fechaPago: document.getElementById('fechaPago').value,
            ultimoMesPago: idx === "-1" ? "" : clientes[idx].ultimoMesPago
        };

        if(!c.nombre || !c.telefono) return alert("Nombre y Teléfono son obligatorios");

        document.getElementById('statusCarga').style.display = 'block';
        try {
            await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(c) });
            if(idx === "-1") clientes.push(c); else clientes[idx] = c;
            limpiar(); 
            actualizarVista();
        } catch (e) { alert("Error al conectar con la base de datos"); }
        document.getElementById('statusCarga').style.display = 'none';
    }

    function editar(i) {
        const c = clientes[i];
        document.getElementById('editIndex').value = i;
        document.getElementById('nombre').value = c.nombre;
        document.getElementById('telefono').value = c.telefono;
        document.getElementById('direccion').value = c.direccion;
        document.getElementById('precio').value = c.precio;
        document.getElementById('plan').value = c.plan;
        document.getElementById('fechaPago').value = c.fechaPago;
        document.getElementById('btnPrincipal').innerText = "🔄 ACTUALIZAR DATOS";
        window.scrollTo(0,0);
    }

    async function eliminarUsuario(i) {
        if(!confirm("¿Estás seguro de eliminar este cliente?")) return;
        const id = clientes[i].id;
        document.getElementById('statusCarga').style.display = 'block';
        await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify({ action: "delete", id: id }) });
        clientes.splice(i, 1);
        actualizarVista();
        document.getElementById('statusCarga').style.display = 'none';
    }

    function enviarWA(i) {
        const c = clientes[i];
        const msg = encodeURIComponent(`Hola ${c.nombre}, te saludamos de NewLink Wireless. Confirmamos la recepción de tu pago. ¡Gracias por tu preferencia!`);
        window.open(`https://wa.me/${c.telefono}?text=${msg}`, '_blank');
    }

    function limpiar() {
        document.querySelectorAll('input').forEach(i => i.value = '');
        document.getElementById('editIndex').value = "-1";
        document.getElementById('btnPrincipal').innerText = "💾 GUARDAR / ACTUALIZAR";
    }

    window.onload = cargarDatos;
</script>
</body>
</html>
